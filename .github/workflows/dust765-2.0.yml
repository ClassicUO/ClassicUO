name: Dust765

on:
  push:
    branches: [ main, developer ]
  pull_request:
    branches: [ main, developer ]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────
  # PR check: fast build-only, runs on every pull_request event
  # ──────────────────────────────────────────────────────────────
  build-test:
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Init submodules
        run: git submodule update --init --recursive
      - name: Override UOScript.csproj for net48
        run: Copy-Item -Path .github\UOScript.csproj -Destination external\UOSteam\UOScript\UOScript.csproj -Force
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore src/ClassicUO.Client/ClassicUO.Client.csproj
      - name: Build (PR check)
        run: dotnet build src/ClassicUO.Client/ClassicUO.Client.csproj -c Release --no-restore

  # ──────────────────────────────────────────────────────────────
  # Full build + artifact upload: runs only after merge (push)
  # ──────────────────────────────────────────────────────────────
  build-windows:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Init submodules
        run: git submodule update --init --recursive
      - name: Override UOScript.csproj for net48
        run: Copy-Item -Path .github\UOScript.csproj -Destination external\UOSteam\UOScript\UOScript.csproj -Force
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore src/ClassicUO.Client/ClassicUO.Client.csproj
      - name: Build with .NET Framework 4.8
        run: dotnet build src/ClassicUO.Client/ClassicUO.Client.csproj -c Release
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENV: production
      - name: Copy build artifacts
        run: |
          New-Item -ItemType Directory -Force -Path build\win-x64
          xcopy /E /I bin\Release\* build\win-x64\
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dust765-windows
          path: build/win-x64

  build-linux:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Init submodules
        run: git submodule update --init --recursive
      - name: Override UOScript.csproj for net48
        run: cp -f .github/UOScript.csproj external/UOSteam/UOScript/UOScript.csproj
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install Mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete
      - name: Restore dependencies
        run: dotnet restore src/ClassicUO.Client/ClassicUO.Client.csproj
      - name: Build with Mono
        run: dotnet build src/ClassicUO.Client/ClassicUO.Client.csproj -c Release
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENV: production
      - name: Copy build artifacts
        run: |
          mkdir -p build/linux-x64
          cp -r bin/Release/* build/linux-x64/
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dust765-linux
          path: build/linux-x64

  build-macos:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Init submodules
        run: git submodule update --init --recursive
      - name: Override UOScript.csproj for net48
        run: cp -f .github/UOScript.csproj external/UOSteam/UOScript/UOScript.csproj
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install Mono
        run: brew install mono
      - name: Restore dependencies
        run: dotnet restore src/ClassicUO.Client/ClassicUO.Client.csproj
      - name: Build with Mono
        run: dotnet build src/ClassicUO.Client/ClassicUO.Client.csproj -c Release
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENV: production
      - name: Copy build artifacts
        run: |
          mkdir -p build/osx-x64
          cp -r bin/Release/* build/osx-x64/
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dust765-macos
          path: build/osx-x64

  release:
    needs: [build-windows, build-linux, build-macos]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/developer')
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ format('v{0}', github.run_number) }}
      BETA: ${{ github.ref == 'refs/heads/developer' && 'beta-' || '' }}
      TAG: ${{ github.ref == 'refs/heads/developer' && format('pre-v{0}', github.run_number) || format('v{0}', github.run_number) }}
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Dust765-windows
          path: artifacts/windows
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Dust765-linux
          path: artifacts/linux
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Dust765-macos
          path: artifacts/macos
      - name: Create Windows archive
        run: zip -r Dust765-${{ env.VERSION }}-${{ env.BETA }}Windows-x64.zip artifacts/windows -x "*.DS_Store"
      - name: Create Linux archive
        run: cd artifacts/linux && zip -r ../../Dust765-${{ env.VERSION }}-${{ env.BETA }}linux.zip . -x "*.DS_Store" && cd ../..
      - name: Create macOS archive
        run: cd artifacts/macos && zip -r ../../Dust765-${{ env.VERSION }}-${{ env.BETA }}mac.zip . -x "*.DS_Store" && cd ../..
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ github.ref == 'refs/heads/developer' && format('Pre-Release v{0}', github.run_number) || format('Release v{0}', github.run_number) }}
          draft: true
          prerelease: ${{ github.ref == 'refs/heads/developer' && 'true' || 'false' }}
          make_latest: ${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}
          files: |
            Dust765-${{ env.VERSION }}-${{ env.BETA }}Windows-x64.zip
            Dust765-${{ env.VERSION }}-${{ env.BETA }}linux.zip
            Dust765-${{ env.VERSION }}-${{ env.BETA }}mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
