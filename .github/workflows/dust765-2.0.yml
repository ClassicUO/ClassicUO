name: Dust765

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore src/ClassicUO.Client/ClassicUO.Client.csproj
      - name: Build with .NET Framework 4.8
        run: dotnet build src/ClassicUO.Client/ClassicUO.Client.csproj -c Release
      - name: Copy build artifacts
        run: |
          New-Item -ItemType Directory -Force -Path build\win-x64
          xcopy /E /I bin\Release\* build\win-x64\
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dust765-windows
          path: build/win-x64

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Mono for .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install Mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete msbuild
      - name: Restore dependencies
        run: dotnet restore src/ClassicUO.Client/ClassicUO.Client.csproj
      - name: Build with Mono
        run: dotnet build src/ClassicUO.Client/ClassicUO.Client.csproj -c Release
      - name: Copy build artifacts
        run: |
          mkdir -p build/linux-x64
          cp -r bin/Release/* build/linux-x64/
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dust765-linux
          path: build/linux-x64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Mono for .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install Mono
        run: |
          brew install mono
          brew install msbuild
      - name: Restore dependencies
        run: dotnet restore src/ClassicUO.Client/ClassicUO.Client.csproj
      - name: Build with Mono
        run: dotnet build src/ClassicUO.Client/ClassicUO.Client.csproj -c Release
      - name: Copy build artifacts
        run: |
          mkdir -p build/osx-x64
          cp -r bin/Release/* build/osx-x64/
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dust765-macos
          path: build/osx-x64

  release:
    needs: [build-windows, build-linux, build-macos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Dust765-windows
          path: artifacts/windows
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Dust765-linux
          path: artifacts/linux
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Dust765-macos
          path: artifacts/macos
      - name: Create Windows archive
        run: zip -r ClassicUO-Windows-x64.zip artifacts/windows -x "*.DS_Store"
      - name: Create Linux archive
        run: tar -czvf ClassicUO-Linux-x64.tar.gz -C artifacts/linux .
      - name: Create macOS archive
        run: tar -czvf ClassicUO-macOS-x64.tar.gz -C artifacts/macos .
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: true
          files: |
            ClassicUO-Windows-x64.zip
            ClassicUO-Linux-x64.tar.gz
            ClassicUO-macOS-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
